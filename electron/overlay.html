<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Back To Work</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: rgba(0, 0, 0, 0.45);
      }
      .card {
        width: min(92vw, 700px);
        border-radius: 18px;
        padding: 18px;
        background: rgba(15, 23, 42, 0.9);
        border: 2px solid rgba(56, 189, 248, 0.8);
        color: #f8fafc;
        text-align: center;
        box-shadow: 0 20px 40px rgba(2, 6, 23, 0.6);
      }
      img {
        width: 100%;
        max-height: 58vh;
        object-fit: contain;
        border-radius: 12px;
        background: #020617;
      }
      .roast {
        margin-top: 14px;
        font-size: 1.25rem;
        font-weight: 700;
      }
      .hint {
        opacity: 0.86;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <img id="gif" alt="Get back to work" />
      <div class="roast" id="roastText"></div>
      <div class="hint">This disappears automatically when your screen looks work-related again.</div>
    </section>
    <script>
      const params = new URLSearchParams(window.location.search);
      const gif = params.get("gif");
      const roast = params.get("roast");

      const img = document.getElementById("gif");
      const roastEl = document.getElementById("roastText");
      if (gif) {
        img.src = gif;
      }
      roastEl.textContent = roast || "Back to work. Your deadline can smell fear.";
    </script>
  </body>
</html>
